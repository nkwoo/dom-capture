<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DOM Capture</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1 class="title">DOM Capture</h1>

    <div class="tabs" role="tablist">
      <button class="tab active" data-tab="element" role="tab" data-i18n="tab_element">Element</button>
      <button class="tab" data-tab="region" role="tab" data-i18n="tab_region">Region</button>
      <button class="tab" data-tab="page" role="tab" data-i18n="tab_page">Page</button>
    </div>

    <!-- Element capture panel -->
    <div class="panel" id="panel-element">
      <button class="btn btn-primary" id="btn-picker" data-i18n="btn_picker">Pick Element with Mouse</button>
      <div class="divider" data-i18n="divider_or">or</div>
      <div class="input-group">
        <select id="selector-type">
          <option value="css">CSS</option>
          <option value="xpath">XPath</option>
        </select>
        <input type="text" id="selector-input"
               data-i18n-placeholder="selector_placeholder"
               placeholder=".my-class or //div[@id='x']">
      </div>
      <button class="btn btn-secondary" id="btn-find" data-i18n="btn_find">Find &amp; Capture Element</button>
    </div>

    <!-- Region capture panel -->
    <div class="panel hidden" id="panel-region">
      <button class="btn btn-primary" id="btn-region" data-i18n="btn_region">Drag to Select Region</button>
    </div>

    <!-- Page capture panel -->
    <div class="panel hidden" id="panel-page">
      <button class="btn btn-secondary" id="btn-viewport" data-i18n="btn_viewport">Capture Viewport</button>
      <button class="btn btn-secondary" id="btn-fullpage" data-i18n="btn_fullpage">Capture Full Page</button>
    </div>

    <!-- Format & output -->
    <div class="output-section">
      <div class="format-group">
        <label><input type="radio" name="format" value="png" checked> PNG</label>
        <label><input type="radio" name="format" value="pdf"> PDF</label>
      </div>
      <div class="action-buttons">
        <button class="btn btn-primary" id="btn-download" data-i18n="btn_download">Download</button>
        <button class="btn btn-secondary" id="btn-clipboard" data-i18n="btn_clipboard">Copy to Clipboard</button>
      </div>
      <div id="preview-container">
        <img id="preview-img" data-i18n-alt="preview_alt" alt="Capture Preview">
      </div>
    </div>

    <div id="status-msg" class="status hidden"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
