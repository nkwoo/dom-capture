<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>DOM Capture</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1 class="title">DOM Capture</h1>

    <div class="tabs" role="tablist">
      <button class="tab active" data-tab="element" role="tab">요소 캡처</button>
      <button class="tab" data-tab="page" role="tab">페이지 캡처</button>
    </div>

    <!-- 요소 캡처 패널 -->
    <div class="panel" id="panel-element">
      <button class="btn btn-primary" id="btn-picker">마우스로 요소 선택</button>
      <div class="divider">또는</div>
      <div class="input-group">
        <select id="selector-type">
          <option value="css">CSS</option>
          <option value="xpath">XPath</option>
        </select>
        <input type="text" id="selector-input" placeholder=".my-class 또는 //div[@id='x']">
      </div>
      <button class="btn btn-secondary" id="btn-find">요소 찾기 &amp; 캡처</button>
    </div>

    <!-- 페이지 캡처 패널 -->
    <div class="panel hidden" id="panel-page">
      <button class="btn btn-secondary" id="btn-viewport">현재 화면 캡처</button>
      <button class="btn btn-secondary" id="btn-fullpage">전체 페이지 캡처</button>
    </div>

    <!-- 포맷 & 출력 -->
    <div class="output-section">
      <div class="format-group">
        <label><input type="radio" name="format" value="png" checked> PNG</label>
        <label><input type="radio" name="format" value="pdf"> PDF</label>
      </div>
      <div class="action-buttons">
        <button class="btn btn-primary" id="btn-download">다운로드</button>
        <button class="btn btn-secondary" id="btn-clipboard">클립보드 복사</button>
      </div>
      <div id="preview-container">
        <img id="preview-img" alt="캡처 미리보기">
      </div>
    </div>

    <div id="status-msg" class="status hidden"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
